<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Raman Developer \u2014 Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:       #e5173f;
      --red-dim:   #9b1028;
      --red-glow:  rgba(229,23,63,0.35);
      --red-faint: rgba(229,23,63,0.08);
      --black:     #060608;
      --surface:   rgba(255,255,255,0.04);
      --border:    rgba(229,23,63,0.25);
      --text:      #f0eaea;
      --muted:     rgba(240,234,234,0.5);
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--text);
      font-family: var(--font-body);
      overflow-x: hidden;
      cursor: none;
    }

    /* \u2500\u2500 Custom cursor \u2500\u2500 */
    #cursor {
      position: fixed; top: 0; left: 0; z-index: 9999;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--red);
      pointer-events: none;
      transform: translate(-50%,-50%);
      transition: width .2s, height .2s, background .2s;
      mix-blend-mode: screen;
    }
    #cursor-ring {
      position: fixed; top: 0; left: 0; z-index: 9998;
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1.5px solid var(--red);
      pointer-events: none;
      transform: translate(-50%,-50%);
      transition: transform .12s ease-out, width .2s, height .2s, opacity .2s;
      opacity: .5;
    }

    /* \u2500\u2500 Noise overlay \u2500\u2500 */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    /* \u2500\u2500 Ambient glow blobs \u2500\u2500 */
    .blob {
      position: fixed; border-radius: 50%;
      filter: blur(100px);
      pointer-events: none; z-index: 0;
    }
    .blob-1 { width: 600px; height: 600px; background: rgba(229,23,63,0.12); top:-200px; right:-100px; }
    .blob-2 { width: 400px; height: 400px; background: rgba(229,23,63,0.08); bottom:100px; left:-150px; }

    /* \u2500\u2500 Nav \u2500\u2500 */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 6vw;
      background: rgba(6,6,8,0.7);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: var(--font-head);
      font-size: 1.35rem; font-weight: 800;
      color: var(--red); letter-spacing: -0.5px;
    }
    .nav-links { display: flex; gap: 2.2rem; list-style: none; }
    .nav-links a {
      color: var(--muted); text-decoration: none;
      font-size: .88rem; font-weight: 500; letter-spacing: .04em;
      transition: color .2s;
    }
    .nav-links a:hover { color: var(--red); }

    /* \u2500\u2500 Section scaffold \u2500\u2500 */
    section { position: relative; z-index: 1; padding: 120px 6vw; }

    /* \u2500\u2500 Glass card mixin \u2500\u2500 */
    .glass {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    /* \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
       HERO
    \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
    #hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: center;
      padding-top: 140px;
    }

    .hero-content { animation: fadeSlideUp .9s ease both; }

    .hero-tag {
      display: inline-block;
      padding: .35rem 1rem;
      border-radius: 999px;
      border: 1px solid var(--red-dim);
      background: var(--red-faint);
      font-size: .78rem; font-weight: 500; letter-spacing: .1em;
      color: var(--red);
      text-transform: uppercase;
      margin-bottom: 1.6rem;
    }

    .hero-title {
      font-family: var(--font-head);
      font-size: clamp(2.5rem, 5vw, 4.2rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -1.5px;
      margin-bottom: 1.2rem;
    }
    .hero-title span {
      background: linear-gradient(135deg, #fff 30%, var(--red));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero-sub {
      font-size: 1.1rem;
      color: var(--muted);
      line-height: 1.7;
      max-width: 460px;
      margin-bottom: 2.4rem;
    }

    .btn-primary {
      display: inline-flex; align-items: center; gap: .6rem;
      padding: .85rem 2.2rem;
      background: var(--red);
      color: #fff; font-family: var(--font-head);
      font-weight: 700; font-size: .95rem; letter-spacing: .03em;
      border: none; border-radius: 12px;
      cursor: none; text-decoration: none;
      box-shadow: 0 0 28px var(--red-glow), 0 4px 16px rgba(0,0,0,.4);
      transition: transform .18s, box-shadow .18s;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 44px var(--red-glow), 0 8px 28px rgba(0,0,0,.5);
    }
    .btn-primary svg { width: 16px; height: 16px; }

    /* Hero image frame */
    .hero-image-wrap {
      position: relative;
      animation: fadeSlideUp .9s .2s ease both;
    }
    .hero-image-wrap::before {
      content: '';
      position: absolute; inset: -2px;
      border-radius: 26px;
      background: linear-gradient(135deg, var(--red), transparent 60%);
      z-index: -1;
    }
    .hero-image-wrap::after {
      content: '';
      position: absolute; bottom: -40px; left: 50%;
      transform: translateX(-50%);
      width: 70%; height: 40px;
      background: var(--red-glow);
      filter: blur(32px);
      border-radius: 50%;
    }
    .hero-img {
      width: 100%; aspect-ratio: 3/4;
      object-fit: cover;
      border-radius: 24px;
      display: block;
      /* fallback gradient portrait */
    }
    /* Fallback portrait placeholder */
    .hero-placeholder {
      width: 100%; aspect-ratio: 3/4;
      border-radius: 24px;
      background: linear-gradient(160deg, #1a0608 0%, #2d0b14 40%, #0e0202 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1rem; overflow: hidden; position: relative;
    }
    .hero-placeholder::after {
      content: '';
      position: absolute; bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 180px; height: 260px;
      background: linear-gradient(to top, rgba(229,23,63,0.15), transparent);
      border-radius: 50% 50% 0 0;
    }
    .hero-silhouette {
      width: 120px; height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3a0e18, #1a0608);
      border: 3px solid rgba(229,23,63,0.4);
      box-shadow: 0 0 40px rgba(229,23,63,0.3);
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: center;
    }
    .hero-silhouette svg { width: 64px; height: 64px; fill: rgba(229,23,63,0.6); }
    .hero-placeholder-text {
      font-family: var(--font-head); font-size: 1.1rem; font-weight: 700;
      color: rgba(229,23,63,0.7); letter-spacing: .05em; position: relative; z-index: 1;
    }

    /* \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
       ABOUT
    \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
    #about {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5rem;
      align-items: center;
    }

    .about-image-wrap {
      position: relative;
      animation: fadeSlideRight .8s ease both;
    }
    .about-image-wrap::before {
      content: '';
      position: absolute; inset: -2px;
      border-radius: 22px;
      background: linear-gradient(225deg, var(--red), transparent 60%);
      z-index: -1;
    }
    .about-placeholder {
      width: 100%; aspect-ratio: 4/3;
      border-radius: 20px;
      background: linear-gradient(135deg, #0e0202 0%, #1f0810 50%, #0a0a0c 100%);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    .about-placeholder::before {
      content: '';
      position: absolute;
      width: 240px; height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(229,23,63,0.2) 0%, transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%,-50%);
    }
    .laptop-icon {
      width: 110px; height: 110px; position: relative; z-index: 1;
    }
    .laptop-icon svg { width: 100%; height: 100%; opacity: .7; }

    .about-content { animation: fadeSlideUp .8s .15s ease both; }
    .section-label {
      font-size: .78rem; letter-spacing: .15em; text-transform: uppercase;
      color: var(--red); font-weight: 600; margin-bottom: .6rem;
    }
    .section-title {
      font-family: var(--font-head);
      font-size: clamp(2rem, 3.5vw, 2.8rem);
      font-weight: 800; letter-spacing: -1px;
      line-height: 1.15;
      margin-bottom: 1.4rem;
    }
    .about-bio {
      color: var(--muted); line-height: 1.8; font-size: .97rem;
      margin-bottom: 2rem;
    }

    .skills-grid {
      display: flex; flex-wrap: wrap; gap: .7rem;
    }
    .skill-badge {
      padding: .45rem 1.1rem;
      border-radius: 10px;
